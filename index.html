  <style>
    :root {
      /* 日式禅意配色 */
      --bg-primary: #F7F5F0;
      --bg-secondary: #EDE9E3;
      --bg-paper: #FFFCF8;
      --ink-primary: #2C2C2C;
      --ink-secondary: #6B6B6B;
      --ink-muted: #9B9B9B;
      --accent-vermilion: #C84B31;
      --accent-bamboo: #4A7C6F;
      --accent-washi: rgba(255, 255, 255, 0.7);
      --shadow-soft: 0 4px 20px rgba(44, 44, 44, 0.06);
      --shadow-elevated: 0 8px 40px rgba(44, 44, 44, 0.12);
      --radius: 2px;
      --radius-lg: 8px;

      /* 字体 */
      --font-serif: 'Noto Serif SC', 'Songti SC', serif;
      --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--ink-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* 纸张纹理背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.015) 2px,
          rgba(0,0,0,0.015) 4px
        ),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: -1;
    }

    /* 登录模态框 */
    .login-modal {
      position: fixed;
      inset: 0;
      background: rgba(247, 245, 240, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(20px);
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .login-modal.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .login-container {
      width: 90%;
      max-width: 420px;
      position: relative;
    }

    .login-card {
      background: var(--bg-paper);
      border: 1px solid rgba(44, 44, 44, 0.08);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      box-shadow: var(--shadow-elevated);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-vermilion), var(--accent-bamboo));
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-title {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 600;
      color: var(--ink-primary);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--ink-muted);
      font-weight: 300;
    }

    /* 账号列表 */
    .account-section {
      margin-bottom: 28px;
    }

    .account-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--ink-muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .account-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 160px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .account-list::-webkit-scrollbar {
      width: 4px;
    }

    .account-list::-webkit-scrollbar-thumb {
      background: var(--bg-secondary);
      border-radius: 2px;
    }

    .account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .account-item:hover {
      background: var(--bg-paper);
      border-color: rgba(200, 75, 49, 0.3);
      transform: translateX(4px);
    }

    .account-item.active {
      background: rgba(200, 75, 49, 0.08);
      border-color: var(--accent-vermilion);
    }

    .account-name {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--ink-primary);
      font-weight: 400;
    }

    .account-item.active .account-name {
      color: var(--accent-vermilion);
      font-weight: 500;
    }

    .account-delete {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0.6;
      transition: all 0.2s ease;
    }

    .account-item:hover .account-delete {
      opacity: 1;
    }

    .account-delete:hover {
      background: rgba(200, 75, 49, 0.1);
      color: var(--accent-vermilion);
    }

    /* 分割线 */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--ink-muted);
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--bg-secondary), transparent);
    }

    .divider::before {
      margin-right: 12px;
    }

    .divider::after {
      margin-left: 12px;
    }

    /* 输入框 */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-field {
      width: 100%;
      padding: 16px 0 12px;
      font-size: 15px;
      border: none;
      border-bottom: 1px solid var(--bg-secondary);
      background: transparent;
      color: var(--ink-primary);
      outline: none;
      transition: border-color 0.3s ease;
      font-family: var(--font-sans);
    }

    .input-field:focus {
      border-bottom-color: var(--accent-vermilion);
    }

    .input-field::placeholder {
      color: var(--ink-muted);
      font-weight: 300;
    }

    .input-label {
      position: absolute;
      left: 0;
      top: 16px;
      font-size: 15px;
      color: var(--ink-muted);
      pointer-events: none;
      transition: all 0.2s ease;
    }

    .input-field:focus + .input-label,
    .input-field:not(:placeholder-shown) + .input-label {
      top: -4px;
      font-size: 11px;
      color: var(--accent-vermilion);
    }

    /* 按钮 */
    .btn {
      width: 100%;
      padding: 16px 24px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: var(--font-sans);
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: var(--ink-primary);
      color: var(--bg-paper);
      box-shadow: var(--shadow-soft);
    }

    .btn-primary:hover {
      background: var(--accent-vermilion);
      transform: translateY(-1px);
      box-shadow: var(--shadow-elevated);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: var(--bg-secondary);
      color: var(--ink-primary);
      border: 1px solid var(--ink-muted);
    }

    .btn-secondary:hover {
      background: var(--bg-paper);
      border-color: var(--ink-secondary);
      transform: translateY(-1px);
      box-shadow: var(--shadow-soft);
    }

    .btn-secondary:active {
      transform: translateY(0);
    }

    /* 关闭按钮 */
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--bg-secondary);
      color: var(--ink-primary);
    }

    /* 主应用容器 */
    .app-container {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 侧边栏 */
    .sidebar {
      background: var(--bg-paper);
      border-right: 1px solid rgba(44, 44, 44, 0.06);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      margin-bottom: 32px;
    }

    .brand-title {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 600;
      color: var(--ink-primary);
      letter-spacing: 0.15em;
      margin-bottom: 4px;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--ink-muted);
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    /* 日历 */
    .calendar-section {
      flex: 1;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .calendar-month {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 600;
      color: var(--ink-primary);
      letter-spacing: 0.05em;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--bg-secondary);
      background: transparent;
      color: var(--ink-secondary);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: var(--bg-primary);
      border-color: var(--accent-vermilion);
      color: var(--accent-vermilion);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .weekday-header {
      text-align: center;
      font-size: 11px;
      color: var(--ink-muted);
      padding: 8px 0;
      font-weight: 400;
      letter-spacing: 0.1em;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--ink-secondary);
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.2s ease;
      position: relative;
    }

    .calendar-day:hover {
      background: var(--bg-primary);
      color: var(--ink-primary);
    }

    .calendar-day.other-month {
      color: var(--ink-muted);
      opacity: 0.5;
    }

    .calendar-day.today {
      color: var(--accent-vermilion);
      font-weight: 600;
    }

    .calendar-day.selected {
      background: var(--ink-primary);
      color: var(--bg-paper);
      font-weight: 500;
    }

    .calendar-day.has-todo::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 4px;
      height: 4px;
      background: var(--accent-bamboo);
      border-radius: 50%;
    }

    .calendar-day.has-note::before {
      content: '✎';
      position: absolute;
      top: 2px;
      right: 2px;
      font-size: 9px;
      line-height: 1;
      color: var(--accent-vermilion);
    }

    .calendar-day.selected.has-note::before {
      color: var(--bg-paper);
      opacity: 0.9;
    }

    /* 侧边栏操作区 */
    .sidebar-actions {
      margin-top: auto;
      padding-top: 24px;
      border-top: 1px solid var(--bg-secondary);
    }

    .action-btn {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: 13px;
      border: 1px solid var(--bg-secondary);
      background: transparent;
      color: var(--ink-secondary);
      cursor: pointer;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }

    .action-btn:hover {
      background: var(--bg-primary);
      border-color: var(--ink-secondary);
      color: var(--ink-primary);
    }

    .action-btn.primary {
      background: var(--ink-primary);
      border-color: var(--ink-primary);
      color: var(--bg-paper);
    }

    .action-btn.primary:hover {
      background: var(--accent-vermilion);
      border-color: var(--accent-vermilion);
    }

    .action-btn.syncing {
      background: rgba(74, 124, 111, 0.1);
      border-color: var(--accent-bamboo);
      color: var(--accent-bamboo);
    }

    .action-btn.success {
      background: rgba(74, 124, 111, 0.15);
      border-color: var(--accent-bamboo);
      color: var(--accent-bamboo);
    }

    .action-btn.error {
      background: rgba(200, 75, 49, 0.1);
      border-color: var(--accent-vermilion);
      color: var(--accent-vermilion);
    }

    .sync-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--ink-muted);
    }

    .current-account {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 12px;
      background: var(--bg-primary);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--ink-secondary);
    }

    .current-account.hidden {
      display: none;
    }

    .empty-state.hidden {
      display: none;
    }

    .account-label {
      color: var(--ink-muted);
    }

    .account-value {
      font-family: var(--font-sans);
      font-weight: 500;
      color: var(--ink-primary);
      letter-spacing: 0.05em;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink-muted);
    }

    .sync-status.online .sync-dot {
      background: var(--accent-bamboo);
    }

    /* 主内容区 */
    .main-content {
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
    }

    .content-header {
      margin-bottom: 40px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 20px;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .search-btn {
      width: 40px;
      height: 40px;
      border: none;
      border-radius: 50%;
      background: var(--bg-secondary);
      color: var(--ink-secondary);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: all 0.2s ease;
    }

    .search-btn:hover {
      background: var(--accent-bamboo);
      color: white;
      transform: scale(1.05);
    }

    /* 搜索面板 */
    .search-panel {
      background: var(--bg-paper);
      border-radius: var(--radius-lg);
      padding: 20px;
      margin-bottom: 24px;
      box-shadow: var(--shadow-soft);
      border: 1px solid rgba(44, 44, 44, 0.06);
    }

    .search-panel.hidden {
      display: none;
    }

    .search-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      border: 1px solid rgba(44, 44, 44, 0.08);
      transition: border-color 0.2s ease;
    }

    .search-input-wrapper:focus-within {
      border-color: var(--accent-bamboo);
    }

    .search-icon {
      font-size: 16px;
      color: var(--ink-muted);
    }

    .search-input {
      flex: 1;
      border: none;
      background: transparent;
      font-size: 15px;
      color: var(--ink-primary);
      outline: none;
      font-family: var(--font-sans);
    }

    .search-input::placeholder {
      color: var(--ink-muted);
    }

    .search-clear {
      width: 24px;
      height: 24px;
      border: none;
      border-radius: 50%;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
    }

    .search-clear:hover {
      background: var(--bg-secondary);
      color: var(--ink-primary);
    }

    /* 搜索结果 */
    .search-results {
      margin-top: 16px;
      max-height: 400px;
      overflow-y: auto;
    }

    .search-result-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 14px 16px;
      border-radius: var(--radius-lg);
      cursor: pointer;
      transition: all 0.2s ease;
      border-bottom: 1px solid rgba(44, 44, 44, 0.04);
    }

    .search-result-item:last-child {
      border-bottom: none;
    }

    .search-result-item:hover {
      background: var(--bg-primary);
    }

    .search-result-date {
      flex-shrink: 0;
      width: 60px;
      text-align: center;
      padding: 6px 8px;
      background: var(--bg-secondary);
      border-radius: var(--radius-lg);
      font-size: 12px;
      color: var(--ink-secondary);
    }

    .search-result-date .day {
      font-size: 18px;
      font-weight: 600;
      color: var(--ink-primary);
      line-height: 1.2;
    }

    .search-result-date .month {
      font-size: 11px;
    }

    .search-result-content {
      flex: 1;
      min-width: 0;
    }

    .search-result-text {
      font-size: 14px;
      color: var(--ink-primary);
      line-height: 1.5;
      margin-bottom: 4px;
      word-break: break-word;
    }

    .search-result-text.completed {
      color: var(--ink-muted);
      text-decoration: line-through;
    }

    .search-result-meta {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink-muted);
    }

    .search-result-time {
      display: inline-flex;
      align-items: center;
      gap: 2px;
      color: var(--accent-bamboo);
    }

    .search-result-note {
      font-size: 12px;
      color: var(--ink-secondary);
      margin-top: 4px;
      line-height: 1.4;
    }

    .search-empty {
      text-align: center;
      padding: 40px 20px;
      color: var(--ink-muted);
    }

    .search-empty-icon {
      font-size: 32px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .search-highlight {
      background: rgba(200, 75, 49, 0.15);
      color: var(--accent-vermilion);
      padding: 0 2px;
      border-radius: 2px;
    }

    .date-display {
      margin-bottom: 8px;
    }

    .date-title {
      font-family: var(--font-serif);
      font-size: 42px;
      font-weight: 600;
      color: var(--ink-primary);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .date-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
    }

    .weekday-label {
      font-size: 14px;
      color: var(--ink-secondary);
      font-weight: 400;
    }

    .stats {
      font-size: 13px;
      color: var(--ink-muted);
      padding: 4px 12px;
      background: var(--bg-secondary);
      border-radius: 20px;
    }

    /* 本周视图 */
    .week-view {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 12px;
      margin-bottom: 32px;
      padding: 20px 0;
      border-bottom: 1px solid var(--bg-secondary);
    }

    .week-day {
      background: var(--bg-paper);
      border: 1px solid rgba(44, 44, 44, 0.06);
      border-radius: var(--radius-lg);
      padding: 16px 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      min-height: 120px;
      min-width: 0;
    }

    .week-day:hover {
      box-shadow: var(--shadow-soft);
      transform: translateY(-2px);
    }

    .week-day.selected {
      border-color: var(--accent-vermilion);
      background: rgba(200, 75, 49, 0.03);
    }

    .week-day.today .week-day-name {
      color: var(--accent-vermilion);
      font-weight: 600;
    }

    .week-day-header {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-bottom: 12px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--bg-secondary);
    }

    .week-day-name {
      font-size: 12px;
      color: var(--ink-muted);
      margin-bottom: 4px;
      letter-spacing: 0.1em;
    }

    .week-day-date {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 600;
      color: var(--ink-primary);
    }

    .week-day-note-icon {
      margin-top: 4px;
      font-size: 11px;
      color: var(--accent-vermilion);
      line-height: 1;
    }

    .week-day-todos {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .week-todo-item {
      font-size: 12px;
      color: var(--ink-secondary);
      padding: 4px 8px;
      background: var(--bg-primary);
      border-radius: var(--radius);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .week-todo-item.completed {
      color: var(--ink-muted);
      text-decoration: line-through;
    }

    .week-time-label {
      display: inline-block;
      font-size: 10px;
      color: var(--accent-bamboo);
      background: rgba(74, 124, 111, 0.12);
      padding: 1px 4px;
      border-radius: 3px;
      margin-right: 4px;
      font-weight: 500;
    }

    .week-todo-more {
      font-size: 11px;
      color: var(--ink-muted);
      text-align: center;
      margin-top: 4px;
    }

    .week-day-empty {
      font-size: 11px;
      color: var(--ink-muted);
      text-align: center;
      padding: 8px 0;
      opacity: 0.6;
    }

    @media (max-width: 900px) {
      .week-view {
        grid-template-columns: repeat(7, minmax(80px, 1fr));
        overflow-x: auto;
        padding-bottom: 16px;
      }

      .week-day {
        min-width: 100px;
      }
    }

    /* 输入区 */
    .input-section {
      margin-bottom: 32px;
    }

    .todo-input-wrapper {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 10px;
      border-bottom: 2px solid var(--bg-secondary);
      padding-bottom: 12px;
      transition: border-color 0.3s ease;
    }

    .todo-input-wrapper:focus-within {
      border-bottom-color: var(--accent-vermilion);
    }

    .todo-input {
      flex: 1;
      padding: 16px 0;
      font-size: 16px;
      border: none;
      background: transparent;
      color: var(--ink-primary);
      outline: none;
      font-family: var(--font-sans);
    }

    .todo-input-row {
      width: 100%;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .todo-note-input {
      width: 100%;
      min-height: 72px;
      max-height: 180px;
      resize: vertical;
      padding: 10px 12px;
      font-size: 14px;
      line-height: 1.6;
      border: 1px solid rgba(44, 44, 44, 0.08);
      border-radius: var(--radius-lg);
      background: rgba(255, 252, 248, 0.7);
      color: var(--ink-primary);
      outline: none;
      font-family: var(--font-sans);
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .todo-note-input:focus {
      border-color: rgba(200, 75, 49, 0.4);
      background: var(--bg-paper);
    }

    .todo-input::placeholder {
      color: var(--ink-muted);
      font-weight: 300;
    }

    .todo-note-input::placeholder {
      color: var(--ink-muted);
      font-weight: 300;
    }

    .add-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: var(--accent-vermilion);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
      letter-spacing: 0.05em;
    }

    .add-btn:hover {
      background: rgba(200, 75, 49, 0.08);
      border-radius: var(--radius);
    }

    /* 简洁模式图片上传 */
    .simple-image-upload {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .simple-image-area {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .simple-image-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 14px;
      font-size: 13px;
      border: 1px solid rgba(44, 44, 44, 0.12);
      border-radius: var(--radius-lg);
      background: rgba(255, 252, 248, 0.7);
      color: var(--ink-secondary);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }

    .simple-image-btn:hover {
      border-color: var(--accent-bamboo);
      background: rgba(74, 124, 111, 0.08);
      color: var(--accent-bamboo);
    }

    .simple-image-count {
      font-size: 11px;
      color: var(--accent-vermilion);
      font-weight: 500;
      min-width: 16px;
      text-align: center;
    }

    .simple-image-count:empty {
      display: none;
    }

    .simple-image-preview {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .simple-thumb-item {
      position: relative;
      width: 50px;
      height: 50px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid rgba(44, 44, 44, 0.08);
    }

    .simple-thumb-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .simple-thumb-remove {
      position: absolute;
      top: 2px;
      right: 2px;
      width: 16px;
      height: 16px;
      border: none;
      border-radius: 50%;
      background: rgba(44, 44, 44, 0.6);
      color: white;
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .simple-thumb-remove:hover {
      background: var(--accent-vermilion);
    }

    /* 智能输入模式 */
    .input-tabs {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }

    .input-tab {
      padding: 6px 16px;
      font-size: 13px;
      font-weight: 400;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
      border-radius: var(--radius);
      position: relative;
    }

    .input-tab:hover {
      color: var(--ink-secondary);
      background: var(--bg-secondary);
    }

    .input-tab.active {
      color: var(--accent-vermilion);
      background: rgba(200, 75, 49, 0.08);
    }

    .input-tab.active::after {
      content: '';
      position: absolute;
      bottom: -2px;
      left: 50%;
      transform: translateX(-50%);
      width: 16px;
      height: 2px;
      background: var(--accent-vermilion);
      border-radius: 1px;
    }

    .smart-input-wrapper {
      display: flex;
      flex-direction: column;
      gap: 12px;
      border-bottom: 2px solid var(--bg-secondary);
      padding-bottom: 12px;
      transition: border-color 0.3s ease;
    }

    .smart-input-wrapper:focus-within {
      border-bottom-color: var(--accent-bamboo);
    }

    .smart-input-hint {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--ink-muted);
      padding: 8px 12px;
      background: rgba(74, 124, 111, 0.08);
      border-radius: var(--radius-lg);
      margin-bottom: 4px;
    }

    .smart-hint-icon {
      font-size: 14px;
    }

    .smart-textarea {
      width: 100%;
      min-height: 100px;
      resize: vertical;
      padding: 14px 16px;
      font-size: 15px;
      line-height: 1.6;
      border: 1px solid rgba(44, 44, 44, 0.08);
      border-radius: var(--radius-lg);
      background: rgba(255, 252, 248, 0.7);
      color: var(--ink-primary);
      outline: none;
      font-family: var(--font-sans);
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .smart-textarea:focus {
      border-color: rgba(74, 124, 111, 0.4);
      background: var(--bg-paper);
    }

    .smart-textarea::placeholder {
      color: var(--ink-muted);
      font-weight: 300;
    }

    .smart-add-btn {
      align-self: flex-end;
      padding: 10px 24px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      background: var(--accent-bamboo);
      color: white;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
      border-radius: var(--radius-lg);
      letter-spacing: 0.02em;
    }

    .smart-add-btn:hover {
      background: #3d6a5f;
      transform: translateY(-1px);
      box-shadow: 0 4px 12px rgba(74, 124, 111, 0.3);
    }

    .smart-add-btn:active {
      transform: translateY(0);
    }

    /* 智能识别预览模态框 */
    .smart-preview-modal {
      position: fixed;
      inset: 0;
      background: rgba(247, 245, 240, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(20px);
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .smart-preview-modal.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .smart-preview-content {
      width: 90%;
      max-width: 420px;
      background: var(--bg-paper);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-elevated);
      padding: 28px;
    }

    .smart-preview-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .smart-preview-header h3 {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 600;
      color: var(--ink-primary);
    }

    .smart-preview-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .smart-preview-close:hover {
      background: var(--bg-secondary);
      color: var(--ink-primary);
    }

    .smart-preview-body {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 28px;
    }

    .preview-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .preview-label {
      font-size: 12px;
      color: var(--ink-muted);
      font-weight: 400;
    }

    .preview-value {
      font-size: 15px;
      color: var(--ink-primary);
      font-weight: 500;
      padding: 10px 14px;
      background: var(--bg-primary);
      border-radius: var(--radius-lg);
      min-height: 40px;
      display: flex;
      align-items: center;
    }

    .preview-value.preview-note {
      min-height: 60px;
      align-items: flex-start;
      white-space: pre-wrap;
    }

    .preview-value:empty::before {
      content: '未识别';
      color: var(--ink-muted);
      font-weight: 300;
      font-style: italic;
    }

    .smart-preview-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .smart-preview-btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
      border-radius: var(--radius-lg);
    }

    .smart-preview-btn.secondary {
      background: var(--bg-secondary);
      color: var(--ink-secondary);
    }

    .smart-preview-btn.secondary:hover {
      background: #e0dcd4;
    }

    .smart-preview-btn.primary {
      background: var(--accent-bamboo);
      color: white;
    }

    .smart-preview-btn.primary:hover {
      background: #3d6a5f;
    }

    /* 待办编辑模态框 */
    .todo-edit-modal {
      position: fixed;
      inset: 0;
      background: rgba(247, 245, 240, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2000;
      backdrop-filter: blur(20px);
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .todo-edit-modal.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .todo-edit-content {
      width: 90%;
      max-width: 480px;
      max-height: 90vh;
      background: var(--bg-paper);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-elevated);
      padding: 28px;
      overflow-y: auto;
    }

    .todo-edit-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
    }

    .todo-edit-header h3 {
      font-family: var(--font-serif);
      font-size: 20px;
      font-weight: 600;
      color: var(--ink-primary);
    }

    .todo-edit-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .todo-edit-close:hover {
      background: var(--bg-secondary);
      color: var(--ink-primary);
    }

    .todo-edit-body {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-bottom: 24px;
    }

    .edit-field {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .edit-label {
      font-size: 13px;
      color: var(--ink-secondary);
      font-weight: 500;
    }

    .edit-input {
      padding: 12px 16px;
      font-size: 15px;
      border: 1px solid rgba(44, 44, 44, 0.08);
      border-radius: var(--radius-lg);
      background: rgba(255, 252, 248, 0.7);
      color: var(--ink-primary);
      outline: none;
      font-family: var(--font-sans);
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .edit-input:focus {
      border-color: rgba(200, 75, 49, 0.4);
      background: var(--bg-paper);
    }

    .edit-textarea {
      padding: 12px 16px;
      font-size: 15px;
      line-height: 1.5;
      border: 1px solid rgba(44, 44, 44, 0.08);
      border-radius: var(--radius-lg);
      background: rgba(255, 252, 248, 0.7);
      color: var(--ink-primary);
      outline: none;
      font-family: var(--font-sans);
      resize: vertical;
      min-height: 80px;
      transition: border-color 0.2s ease, background 0.2s ease;
    }

    .edit-textarea:focus {
      border-color: rgba(200, 75, 49, 0.4);
      background: var(--bg-paper);
    }

    /* 图片上传区域 */
    .image-upload-area {
      position: relative;
    }

    .image-input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .image-upload-placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 24px;
      border: 2px dashed rgba(44, 44, 44, 0.12);
      border-radius: var(--radius-lg);
      background: rgba(255, 252, 248, 0.5);
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .image-upload-placeholder:hover {
      border-color: var(--accent-bamboo);
      background: rgba(74, 124, 111, 0.05);
    }

    .upload-icon {
      font-size: 24px;
    }

    .upload-text {
      font-size: 14px;
      color: var(--ink-secondary);
    }

    .upload-hint {
      font-size: 12px;
      color: var(--ink-muted);
    }

    /* 图片预览容器 */
    .image-preview-container {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .image-preview-item {
      position: relative;
      width: 100px;
      height: 100px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      border: 1px solid rgba(44, 44, 44, 0.08);
    }

    .image-preview-item img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .image-preview-remove {
      position: absolute;
      top: 4px;
      right: 4px;
      width: 22px;
      height: 22px;
      border: none;
      border-radius: 50%;
      background: rgba(44, 44, 44, 0.6);
      color: white;
      font-size: 12px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .image-preview-remove:hover {
      background: var(--accent-vermilion);
    }

    .todo-edit-actions {
      display: flex;
      gap: 12px;
      justify-content: flex-end;
    }

    .todo-edit-btn {
      padding: 10px 20px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
      border-radius: var(--radius-lg);
    }

    .todo-edit-btn.secondary {
      background: var(--bg-secondary);
      color: var(--ink-secondary);
    }

    .todo-edit-btn.secondary:hover {
      background: #e0dcd4;
    }

    .todo-edit-btn.danger {
      background: rgba(200, 75, 49, 0.1);
      color: var(--accent-vermilion);
    }

    .todo-edit-btn.danger:hover {
      background: rgba(200, 75, 49, 0.2);
    }

    .todo-edit-btn.primary {
      background: var(--accent-bamboo);
      color: white;
    }

    .todo-edit-btn.primary:hover {
      background: #3d6a5f;
    }

    /* 图片查看器模态框 */
    .image-viewer-modal {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3000;
      cursor: zoom-out;
      transition: opacity 0.3s ease, visibility 0.3s ease;
    }

    .image-viewer-modal.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .image-viewer-content {
      position: relative;
      max-width: 90vw;
      max-height: 90vh;
    }

    .image-viewer-content img {
      max-width: 100%;
      max-height: 90vh;
      object-fit: contain;
      border-radius: var(--radius-lg);
    }

    .image-viewer-close {
      position: absolute;
      top: -40px;
      right: 0;
      width: 36px;
      height: 36px;
      border: none;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s ease;
    }

    .image-viewer-close:hover {
      background: rgba(255, 255, 255, 0.4);
    }

    /* 待办项中的图片缩略图 */
    .todo-images {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 10px;
    }

    .todo-thumbnail {
      width: 60px;
      height: 60px;
      border-radius: var(--radius-lg);
      overflow: hidden;
      cursor: pointer;
      border: 1px solid rgba(44, 44, 44, 0.08);
      transition: transform 0.2s ease;
    }

    .todo-thumbnail:hover {
      transform: scale(1.05);
    }

    .todo-thumbnail img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .todo-thumbnail.more {
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      color: var(--ink-secondary);
      font-size: 12px;
      font-weight: 500;
    }

    /* 时间标签 */
    .todo-time-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--accent-bamboo);
      background: rgba(74, 124, 111, 0.1);
      padding: 4px 10px;
      border-radius: 12px;
      margin-top: 6px;
      font-weight: 500;
    }

    .todo-time-tag .time-icon {
      font-size: 11px;
    }

    .todo-time-tag.single-time {
      color: var(--ink-muted);
      background: rgba(44, 44, 44, 0.06);
    }

    /* 响应式 */

<body>
  <!-- 登录模态框 -->
  <div id="loginModal" class="login-modal">
    <div class="login-container">
      <div class="login-card">
        <button id="closeLoginModal" class="modal-close" title="关闭">×</button>
        <div class="login-header">

          <p class="login-subtitle">每日计划 · 随心而行</p>
        </div>

        <div class="divider">新账号登录</div>

          <input type="password" id="syncPassword" class="input-field" placeholder="输入同步密码..." autocomplete="off">
        </div>

        <button id="loginBtn" class="btn btn-primary">开始同步</button>

        <p class="hint-text">密码即账号，在新设备输入相同密码即可同步数据</p>
      </div>
    </div>
  </div>

  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">Daily</div>
        <div class="brand-subtitle">每日计划 · Simple & Focused</div>
      </div>

      <div class="calendar-section">
        <div class="calendar-header">
          <span id="currentMonth" class="calendar-month"></span>
          <div class="calendar-nav">
            <button id="prevMonth" class="nav-btn" title="上个月">‹</button>
            <button id="nextMonth" class="nav-btn" title="下个月">›</button>
          </div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>

      <div class="sidebar-actions">
        <button id="goToday" class="action-btn">今日</button>
        <button id="syncBtn" class="action-btn primary">同步到云端</button>
        <div id="currentAccount" class="current-account hidden">
          <span class="account-label">当前账号</span>
          <span id="accountValue" class="account-value"></span>
        </div>
        <div id="syncStatus" class="sync-status">
          <span class="sync-dot"></span>
          <span>本地模式</span>
        </div>
        <button id="logoutBtn" class="action-btn" style="display: none;">切换账号</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <header class="content-header">
        <div class="date-display">
          <h1 id="dateTitle" class="date-title"></h1>
          <div class="date-meta">
            <span id="weekdayLabel" class="weekday-label"></span>
            <span id="statsText" class="stats">0/0 已完成</span>
          </div>
        </div>
        <div class="header-actions">
          <button class="search-btn" onclick="toggleSearchPanel()" title="搜索">
            <span>🔍</span>
          </button>
        </div>
      </header>

      <!-- 搜索面板 -->
      <div id="searchPanel" class="search-panel hidden">
        <div class="search-input-wrapper">
          <span class="search-icon">🔍</span>
          <input type="text" id="searchInput" class="search-input" placeholder="搜索所有待办事项..." autocomplete="off">
          <button class="search-clear" onclick="clearSearch()" title="清空">×</button>
        </div>
        <div id="searchResults" class="search-results"></div>
      </header>

      <div class="week-view" id="weekView">

      </div>

      <div class="input-section">
        <div class="input-tabs">
          <button class="input-tab active" data-mode="simple" onclick="switchInputMode('simple')">简洁模式</button>
          <button class="input-tab" data-mode="smart" onclick="switchInputMode('smart')">智能模式</button>
        </div>

        <!-- 简洁模式 -->
        <div id="simpleInputPanel" class="todo-input-wrapper">

            <button class="smart-preview-close" onclick="closeSmartPreview()">×</button>
          </div>

            <div class="preview-item">
              <span class="preview-label">事项内容</span>
              <div id="previewText" class="preview-value"></div>

              <span class="preview-label">日期</span>
              <div id="previewDate" class="preview-value"></div>
            </div>

              <span class="preview-label">开始时间</span>
              <div id="previewStartTime" class="preview-value"></div>
            </div>
            <div class="preview-item">
              <span class="preview-label">结束时间</span>
              <div id="previewEndTime" class="preview-value"></div>
            </div>
            <div id="previewNotePanel" class="preview-item hidden">

              <div id="previewNote" class="preview-value preview-note"></div>
            </div>

      </div>

        <div id="todoList" class="todo-list"></div>
        <div id="emptyState" class="empty-state">

          <div class="empty-hint">点击下方输入框添加事项</div>
        </div>
      </div>
    </main>

  <script>

    // ========== 状态管理 ==========

    let selectedDate = formatDate(new Date())
    let todos = {}
    let syncPassword = localStorage.getItem('daily-planner-current-account') || ''
    let accounts = JSON.parse(localStorage.getItem('daily-planner-accounts') || '[]')
    let isOnline = false
    let syncTimeout = null

    // ========== DOM 元素 ==========
    const dateTitle = document.getElementById('dateTitle')

    // ========== 工具函数 ==========
    function formatDate(date) {
      const year = date.getFullYear()
      const month = String(date.getMonth() + 1).padStart(2, '0')
      const day = String(date.getDate()).padStart(2, '0')
      return `${year}-${month}-${day}`
    }

    function formatDisplayDate(dateStr) {
      const [year, month, day] = dateStr.split('-')
      return `${year}年${parseInt(month)}月${parseInt(day)}日`
    }

    function getWeekday(dateStr) {
      const date = new Date(dateStr)
      const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六']
      return weekdays[date.getDay()]
    }

    function isToday(dateStr) {
      return dateStr === formatDate(new Date())
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    function getVisibleTodos(dateStr) {
      return (todos[dateStr] || []).filter(t => !t.deleted)
    }

    function hasNote(todo) {
      return Boolean(todo.note && todo.note.trim())
    }

    function dateHasNote(dateStr) {
      return getVisibleTodos(dateStr).some(hasNote)
    }

    // ========== API 调用 ==========
    async function apiCall(endpoint, method = 'GET', body = null) {
      if (!syncPassword) return null

      const options = {
        method,
        headers: {
          'Authorization': `Bearer ${syncPassword}`,
          'Content-Type': 'application/json'
        }
      }

      if (body) {
        options.body = JSON.stringify(body)
      }

      try {
        const response = await fetch(`${API_BASE}${endpoint}`, options)
        if (!response.ok) throw new Error(`HTTP ${response.status}`)
        return await response.json()
      } catch (error) {
        console.error('API Error:', error)
        throw error
      }
    }

      if (!syncPassword) {

        return

      setSyncButtonState('syncing')

      try {
        const cloudData = await apiCall('/todos/sync', 'PUT', {
          localTodos: todos,
          lastSync: Date.now()
        })

        if (cloudData.success) {
          todos = cloudData.data
          saveLocalTodos()
          renderTodos()
          renderCalendar()
          renderWeekView()
          setSyncButtonState('success')
          updateSyncStatus(true)
        }
      } catch (error) {
        console.error('Sync failed:', error)
        setSyncButtonState('error')
        updateSyncStatus(false)
      }

      setTimeout(() => {
        setSyncButtonState('idle')
      }, 2000)

    // ========== 智能时间解析功能 ==========

    // 当前识别的结果（用于预览确认）
    let currentParsedResult = null

    /**
     * 智能时间解析引擎
     * 解析自然语言中的日期、时间信息
     */
    function parseSmartInput(input) {
      const result = {
        text: '',
        note: '',
        date: null,  // 相对日期偏移或绝对日期
        startTime: null,  // 开始时间 HH:MM
        endTime: null,    // 结束时间 HH:MM
        originalDate: selectedDate // 默认使用当前选中的日期
      }

      if (!input || !input.trim()) return result

      let text = input.trim()

      // 1. 提取日期信息
      const datePatterns = [
        // 明天
        { regex: /明天|明日/g, handler: () => getRelativeDate(1) },
        // 后天
        { regex: /后天|後天/g, handler: () => getRelativeDate(2) },
        // 大后天
        { regex: /大后天|大後天/g, handler: () => getRelativeDate(3) },
        // 昨天
        { regex: /昨天|昨日/g, handler: () => getRelativeDate(-1) },
        // 今天
        { regex: /今天/g, handler: () => getRelativeDate(0) },
        // 下周X
        { regex: /下[周|週|星期]([一二三四五六日天])/g, handler: (match, weekday) => getNextWeekday(weekday) },
        // 本周X / 这周一/二/三...
        { regex: /(?:本|这)[周|週|星期]([一二三四五六日天])/g, handler: (match, weekday) => getThisWeekday(weekday) },
        // MM月DD日 / M月D日
        { regex: /(\d{1,2})[月/](\d{1,2})[日号]?/g, handler: (match, m, d) => {
          const now = new Date()
          const year = now.getFullYear()
          const month = parseInt(m) - 1
          const day = parseInt(d)
          const date = new Date(year, month, day)
          return formatDate(date)
        }},
        // MM-DD / MM.DD
        { regex: /(\d{1,2})[-\.](\d{1,2})/g, handler: (match, m, d) => {
          const now = new Date()
          const year = now.getFullYear()
          const month = parseInt(m) - 1
          const day = parseInt(d)
          const date = new Date(year, month, day)
          return formatDate(date)
        }},
        // YYYY年MM月DD日
        { regex: /(\d{4})[年/](\d{1,2})[月/](\d{1,2})[日号]?/g, handler: (match, y, m, d) => {
          const date = new Date(parseInt(y), parseInt(m) - 1, parseInt(d))
          return formatDate(date)
        }}
      ]

      // 尝试匹配日期
      for (const pattern of datePatterns) {
        const matches = [...text.matchAll(pattern.regex)]
        if (matches.length > 0) {
          const lastMatch = matches[matches.length - 1]
          const parsedDate = pattern.handler(lastMatch[0], lastMatch[1], lastMatch[2], lastMatch[3])
          if (parsedDate) {
            result.date = parsedDate
            // 从文本中移除日期部分（但保留用于显示）
            text = text.replace(lastMatch[0], '')
            break
          }
        }
      }

      // 2. 提取时间范围
      // 开始和结束时间模式：X点到Y点、X点-Y点、X:XX-Y:XX等
      const timeRangePatterns = [
        // X点到Y点 / X点钟到Y点钟
        { regex: /(\d{1,2})[点:时](?:钟?)[\s]*(?:到|至|-|~)[\s]*(\d{1,2})[点:时](?:钟?)/g, type: 'range' },
        // X:XX到Y:YY / X:XX-Y:XX
        { regex: /(\d{1,2}):(\d{2})[\s]*(?:到|至|-|~)[\s]*(\d{1,2}):(\d{2})/g, type: 'range' },
        // 上午X点到下午Y点
        { regex: /(?:上午|早上|早晨)(\d{1,2})[点:时][\s]*(?:到|至|-|~)[\s]*(?:下午|晚上|傍晚)(\d{1,2})[点:时]/g, type: 'ampm_range', ampm: true },
        // 从X点开始 / X点开始
        { regex: /(?:从)?[\s]*(\d{1,2})[点:时](?:钟?)(?:开始|起)/g, type: 'start' },
        // 到X点结束 / 至X点
        { regex: /(?:到|至|直到)[\s]*(\d{1,2})[点:时](?:钟?)(?:结束|为止|止)?/g, type: 'end' },
        // 持续X小时
        { regex: /持续(\d+)[\s]*个?[小时半]/g, type: 'duration' },
        // 单独时间点：下午X点 / 晚上X点
        { regex: /(?:下午|晚上|傍晚|晚间)(\d{1,2})[点:时](?:钟?)/g, type: 'single', offset: 12 },
        { regex: /(?:上午|早上|早晨|晨间)(\d{1,2})[点:时](?:钟?)/g, type: 'single', offset: 0 },
        // X点 / X点钟
        { regex: /(\d{1,2})[点:时](?:钟?)/g, type: 'single', offset: 0 },
        // X:XX
        { regex: /(\d{1,2}):(\d{2})/g, type: 'single_detail' }
      ]

      let startHour = null, startMinute = 0
      let endHour = null, endMinute = 0

      for (const pattern of timeRangePatterns) {
        const matches = [...text.matchAll(pattern.regex)]
        for (const match of matches) {
          if (pattern.type === 'range') {
            // 范围模式 X点到Y点 或 X:XX-Y:XX
            if (match[0].includes(':')) {
              startHour = parseInt(match[1])
              startMinute = parseInt(match[2])
              endHour = parseInt(match[3])
              endMinute = parseInt(match[4])
            } else {
              startHour = parseInt(match[1])
              endHour = parseInt(match[2])
            }
            text = text.replace(match[0], '')
          } else if (pattern.type === 'ampm_range') {
            startHour = parseInt(match[1])
            endHour = parseInt(match[2]) + 12
            text = text.replace(match[0], '')
          } else if (pattern.type === 'start') {
            startHour = parseInt(match[1])
            text = text.replace(match[0], '')
          } else if (pattern.type === 'end') {
            endHour = parseInt(match[1])
            text = text.replace(match[0], '')
          } else if (pattern.type === 'single') {
            // 单个时间，根据上下文判断是开始还是结束
            const hour = parseInt(match[1]) + (pattern.offset || 0)
            if (startHour === null) {
              startHour = hour
            } else {
              endHour = hour
            }
            text = text.replace(match[0], '')
          } else if (pattern.type === 'single_detail') {
            const hour = parseInt(match[1])
            const minute = parseInt(match[2])
            if (startHour === null) {
              startHour = hour
              startMinute = minute
            } else {
              endHour = hour
              endMinute = minute
            }
            text = text.replace(match[0], '')
          }
        }
      }

      // 处理持续时长
      if (startHour !== null && endHour === null) {
        const durationMatch = input.match(/持续(\d+)(?:\.5|个半)?[\s]*个?[小时半]/)
        if (durationMatch) {
          let duration = parseFloat(durationMatch[1])
          if (input.includes('半') && !input.includes('个半小时')) {
            duration += 0.5
          }
          endHour = startHour + Math.floor(duration)
          endMinute = startMinute + (duration % 1) * 60
          if (endMinute >= 60) {
            endHour += 1
            endMinute -= 60
          }
        }
      }

      // 格式化时间
      if (startHour !== null) {
        result.startTime = `${String(startHour).padStart(2, '0')}:${String(startMinute).padStart(2, '0')}`
      }
      if (endHour !== null) {
        result.endTime = `${String(endHour).padStart(2, '0')}:${String(endMinute).padStart(2, '0')}`
      }

      // 清理文本，提取事项内容和备注
      // 用换行分隔事项和备注
      const lines = text.split(/\n+/).filter(line => line.trim())
      if (lines.length > 0) {
        result.text = lines[0].trim()
        if (lines.length > 1) {
          result.note = lines.slice(1).join('\n').trim()
        }
      }

      // 如果没有提取到文本，使用原始输入
      if (!result.text) {
        result.text = input.trim()
      }

      // 最终使用哪个日期
      if (result.date) {
        result.originalDate = result.date
      }

      return result
    }

    // 获取相对日期
    function getRelativeDate(offsetDays) {
      const date = new Date()
      date.setDate(date.getDate() + offsetDays)
      return formatDate(date)
    }

    // 获取本周的某一天
    function getThisWeekday(weekday) {
      const weekdays = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '日': 0, '天': 0 }
      const targetDay = weekdays[weekday] || 0
      const today = new Date()
      const currentDay = today.getDay()
      const diff = targetDay - currentDay
      const date = new Date(today)
      date.setDate(today.getDate() + diff)
      return formatDate(date)
    }

    // 获取下周的某一天
    function getNextWeekday(weekday) {
      const weekdays = { '一': 1, '二': 2, '三': 3, '四': 4, '五': 5, '六': 6, '日': 0, '天': 0 }
      const targetDay = weekdays[weekday] || 0
      const today = new Date()
      const currentDay = today.getDay()
      // 计算到下周目标天的天数差
      const daysUntilNextWeek = 7 - currentDay + targetDay
      const date = new Date(today)
      date.setDate(today.getDate() + daysUntilNextWeek)
      return formatDate(date)
    }

    // 格式化时间为显示字符串
    function formatTimeDisplay(timeStr) {
      if (!timeStr) return null
      const [hour, minute] = timeStr.split(':').map(Number)
      const hourStr = hour
      const minuteStr = minute > 0 ? `:${String(minute).padStart(2, '0')}` : ''
      return `${hourStr}${minuteStr}`
    }

    // 格式化时间段显示
    function formatTimeRange(startTime, endTime) {
      if (startTime && endTime) {
        return `${formatTimeDisplay(startTime)} - ${formatTimeDisplay(endTime)}`
      } else if (startTime) {
        return `${formatTimeDisplay(startTime)} 开始`
      } else if (endTime) {
        return `${formatTimeDisplay(endTime)} 结束`
      }
      return null
    }

    // 切换输入模式
    function switchInputMode(mode) {
      const simplePanel = document.getElementById('simpleInputPanel')
      const smartPanel = document.getElementById('smartInputPanel')
      const tabs = document.querySelectorAll('.input-tab')

      tabs.forEach(tab => {
        if (tab.dataset.mode === mode) {
          tab.classList.add('active')
        } else {
          tab.classList.remove('active')
        }
      })

      if (mode === 'simple') {
        simplePanel.classList.remove('hidden')
        smartPanel.classList.add('hidden')
      } else {
        simplePanel.classList.add('hidden')
        smartPanel.classList.remove('hidden')
        smartInput.focus()
      }
    }

    // 处理智能输入
    function handleSmartInput() {
      const input = smartInput.value.trim()
      if (!input) return

      const parsed = parseSmartInput(input)
      currentParsedResult = parsed

      // 显示预览
      showSmartPreview(parsed)
    }

    // 显示预览模态框
    function showSmartPreview(parsed) {
      previewText.textContent = parsed.text || '（未识别）'
      previewDate.textContent = parsed.date
        ? `${parsed.date} (${getWeekday(parsed.date)})`
        : `${selectedDate} (${getWeekday(selectedDate)}) - 当前选中日期`
      previewStartTime.textContent = parsed.startTime || ''
      previewEndTime.textContent = parsed.endTime || ''

      if (parsed.note) {
        previewNotePanel.classList.remove('hidden')
        previewNote.textContent = parsed.note
      } else {
        previewNotePanel.classList.add('hidden')
        previewNote.textContent = ''
      }

      smartPreviewModal.classList.remove('hidden')
    }

    // 关闭预览模态框
    function closeSmartPreview() {
      smartPreviewModal.classList.add('hidden')
      currentParsedResult = null
    }

    // 确认添加智能识别的待办
    function confirmSmartAdd() {
      if (!currentParsedResult) return

      const targetDate = currentParsedResult.date || selectedDate

      if (!todos[targetDate]) {
        todos[targetDate] = []
      }

      const newTodo = {
        id: Date.now(),
        text: currentParsedResult.text,
        note: currentParsedResult.note,
        completed: false,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString(),
        startTime: currentParsedResult.startTime,
        endTime: currentParsedResult.endTime
      }

      todos[targetDate].push(newTodo)
      saveLocalTodos()

      if (syncPassword) {
        debouncedSync()
      }

      // 如果添加到了其他日期，切换到那个日期
      if (targetDate !== selectedDate) {
        selectDate(targetDate)
      } else {
        renderTodos()
        renderCalendar()
        renderWeekView()
      }

      // 清空输入
      smartInput.value = ''

    // ========== 图片处理功能 ==========

    // 当前编辑的待办ID和临时图片数组
    let currentEditingTodoId = null
    let tempImages = []

    // 压缩图片
    function compressImage(file, maxWidth = 800, maxHeight = 800, quality = 0.7) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader()
        reader.onload = (e) => {
          const img = new Image()
          img.onload = () => {
            let width = img.width
            let height = img.height

            // 计算缩放比例
            if (width > maxWidth || height > maxHeight) {
              const ratio = Math.min(maxWidth / width, maxHeight / height)
              width = Math.floor(width * ratio)
              height = Math.floor(height * ratio)
            }

            const canvas = document.createElement('canvas')
            canvas.width = width
            canvas.height = height
            const ctx = canvas.getContext('2d')
            ctx.drawImage(img, 0, 0, width, height)

            // 转换为base64，使用较低质量
            const dataUrl = canvas.toDataURL('image/jpeg', quality)
            resolve(dataUrl)
          }
          img.onerror = reject
          img.src = e.target.result
        }
        reader.onerror = reject
        reader.readAsDataURL(file)
      })
    }

    // 处理图片上传
    async function handleImageUpload(event) {
      const files = Array.from(event.target.files)
      if (files.length === 0) return

      // 限制最多3张图片
      const remainingSlots = 3 - tempImages.length
      if (remainingSlots <= 0) {
        alert('最多只能上传3张图片')
        return
      }

      const filesToProcess = files.slice(0, remainingSlots)

      for (const file of filesToProcess) {
        if (!file.type.startsWith('image/')) continue

        try {
          const compressedDataUrl = await compressImage(file)
          tempImages.push(compressedDataUrl)
        } catch (error) {
          console.error('图片处理失败:', error)
        }
      }

      renderImagePreviews()

      // 清空input，允许重复选择相同文件
      event.target.value = ''
    }

      if (tempImages.length === 0) {
        imagePreviewContainer.innerHTML = ''

      imagePreviewContainer.innerHTML = tempImages.map((img, index) => `
        <div class="image-preview-item">
          <img src="${img}" alt="预览${index + 1}">
          <button class="image-preview-remove" onclick="removeTempImage(${index})" title="删除">×</button>
        </div>
      `).join('')
    }

    // 移除临时图片
    function removeTempImage(index) {
      tempImages.splice(index, 1)

    // 处理图片粘贴（通用函数）
    async function handleImagePaste(event, targetImages, renderCallback) {
      const items = event.clipboardData?.items
      if (!items) return

      const imageItems = []
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          const blob = item.getAsFile()
          if (blob) {
            imageItems.push(blob)
          }
        }
      }

      if (imageItems.length === 0) return

      // 检查剩余槽位
      const remainingSlots = 3 - targetImages.length
      if (remainingSlots <= 0) {
        alert('最多只能上传3张图片')
        return
      }

      const filesToProcess = imageItems.slice(0, remainingSlots)

      for (const blob of filesToProcess) {
        try {
          const file = new File([blob], `pasted-image-${Date.now()}.png`, { type: blob.type })
          const compressedDataUrl = await compressImage(file)
          targetImages.push(compressedDataUrl)
        } catch (error) {
          console.error('粘贴图片处理失败:', error)
        }
      }

      renderCallback()
    }

    // ========== 搜索功能 ==========

    function toggleSearchPanel() {
      const isHidden = searchPanel.classList.contains('hidden')
      if (isHidden) {
        searchPanel.classList.remove('hidden')
        searchInput.focus()
        // 如果有输入，执行搜索
        if (searchInput.value.trim()) {
          performSearch(searchInput.value.trim())
        }
      } else {
        searchPanel.classList.add('hidden')
        searchInput.value = ''
        searchResults.innerHTML = ''
      }
    }

    function clearSearch() {
      searchInput.value = ''
      searchResults.innerHTML = ''
      searchInput.focus()
    }

    function performSearch(keyword) {
      if (!keyword) {
        searchResults.innerHTML = ''
        return
      }

      const results = []
      const lowerKeyword = keyword.toLowerCase()

      // 遍历所有日期的待办
      for (const [date, dateTodos] of Object.entries(todos)) {
        if (!Array.isArray(dateTodos)) continue

        for (const todo of dateTodos) {
          if (todo.deleted) continue

          // 搜索标题、备注
          const textMatch = todo.text.toLowerCase().includes(lowerKeyword)
          const noteMatch = todo.note && todo.note.toLowerCase().includes(lowerKeyword)

          if (textMatch || noteMatch) {
            results.push({
              ...todo,
              date: date
            })
          }
        }
      }

      // 按日期排序（最新的在前）
      results.sort((a, b) => new Date(b.date) - new Date(a.date))

      renderSearchResults(results, keyword)
    }

    function renderSearchResults(results, keyword) {
      if (results.length === 0) {
        searchResults.innerHTML = `
          <div class="search-empty">
            <div class="search-empty-icon">🔍</div>
            <div>未找到包含 "${escapeHtml(keyword)}" 的事项</div>
          </div>
        `
        return
      }

      searchResults.innerHTML = results.map(todo => {
        const date = new Date(todo.date)
        const day = date.getDate()
        const month = date.getMonth() + 1
        const isCompleted = todo.completed
        const timeRange = formatTimeRange(todo.startTime, todo.endTime)

        // 高亮匹配的关键词
        const highlightedText = highlightText(todo.text, keyword)
        const highlightedNote = todo.note ? highlightText(todo.note, keyword) : ''

        return `
          <div class="search-result-item" onclick="goToSearchResult('${todo.date}', ${todo.id})">
            <div class="search-result-date">
              <div class="day">${day}</div>
              <div class="month">${month}月</div>
            </div>
            <div class="search-result-content">
              <div class="search-result-text ${isCompleted ? 'completed' : ''}">${highlightedText}</div>
              ${timeRange ? `<div class="search-result-meta"><span class="search-result-time">◷ ${timeRange}</span></div>` : ''}
              ${highlightedNote ? `<div class="search-result-note">${highlightedNote}</div>` : ''}
            </div>
          </div>
        `
      }).join('')
    }

    function highlightText(text, keyword) {
      if (!keyword) return escapeHtml(text)
      const lowerText = text.toLowerCase()
      const lowerKeyword = keyword.toLowerCase()
      let result = ''
      let lastIndex = 0

      while (true) {
        const index = lowerText.indexOf(lowerKeyword, lastIndex)
        if (index === -1) break

        result += escapeHtml(text.slice(lastIndex, index))
        result += `<span class="search-highlight">${escapeHtml(text.slice(index, index + keyword.length))}</span>`
        lastIndex = index + keyword.length
      }

      result += escapeHtml(text.slice(lastIndex))
      return result
    }

    function goToSearchResult(date, todoId) {

          todoElement.style.animation = 'highlight-pulse 1s ease'
          setTimeout(() => {
            todoElement.style.animation = ''

        }
      }, 100)

    searchHighlightStyle.textContent = `

      }
    `
    document.head.appendChild(searchHighlightStyle)

    function addTodo() {
      const text = todoInput.value.trim()
      const note = todoNoteInput.value.trim()
      if (!text) return

      if (!todos[selectedDate]) {
        todos[selectedDate] = []
      }

      const newTodo = {
        id: Date.now(),
        text: text,
        note: note,
        completed: false,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      }

      // 如果有图片，添加到待办
      if (simpleTempImages.length > 0) {
        newTodo.images = [...simpleTempImages]
      }

      todos[selectedDate].push(newTodo)
      saveLocalTodos()

      if (syncPassword) {
        debouncedSync()
      }

      todoInput.value = ''
      todoNoteInput.value = ''
      clearSimpleImages()
      renderTodos()
      renderCalendar()
      renderWeekView()
    }

    function toggleTodo(id) {
      const dateTodos = todos[selectedDate]
      const todo = dateTodos.find(t => t.id === id)
      if (todo) {
        todo.completed = !todo.completed
        todo.updatedAt = new Date().toISOString()
        saveLocalTodos()

        if (syncPassword) {
          debouncedSync()
        }

        renderTodos()
        renderWeekView()
      }
    }

    function deleteTodo(id) {
      const dateTodos = todos[selectedDate]
      const todo = dateTodos.find(t => t.id === id)
      if (todo) {
        todo.deleted = true
        todo.updatedAt = new Date().toISOString()
        saveLocalTodos()

        if (syncPassword) {
          debouncedSync()
        }

        renderTodos()
        renderCalendar()
        renderWeekView()
      }

    let editingTodoId = null

    // ========== 编辑模态框功能 ==========

    function openTodoEditModal(id) {
      const dateTodos = todos[selectedDate]
      const todo = dateTodos.find(t => t.id === id)
      if (!todo) return

      currentEditingTodoId = id
      editingTodoId = id

      editTodoText.value = todo.text
      editTodoNote.value = todo.note || ''

      editTodoNote.addEventListener('paste', handleEditPaste)

      editTodoText.removeEventListener('paste', handleEditPaste)
      editTodoNote.removeEventListener('paste', handleEditPaste)
      imagePreviewContainer.removeEventListener('paste', handleEditPaste)

      currentEditingTodoId = null
      editingTodoId = null
      tempImages = []
      imagePreviewContainer.innerHTML = ''
      editTodoText.value = ''
      editTodoNote.value = ''
    }

    function saveTodoEdit() {
      if (!currentEditingTodoId) return

      const dateTodos = todos[selectedDate]
      const todo = dateTodos.find(t => t.id === currentEditingTodoId)
      if (!todo) return

      const newText = editTodoText.value.trim()
      if (!newText) {
        alert('事项内容不能为空')
        return
      }

      todo.text = newText
      todo.note = editTodoNote.value.trim()
      todo.images = tempImages.length > 0 ? tempImages : undefined
      todo.updatedAt = new Date().toISOString()

      saveLocalTodos()

      if (syncPassword) {
        debouncedSync()
      }

      renderTodos()
      renderCalendar()
      renderWeekView()
      closeTodoEditModal()
    }

    function deleteEditingTodo() {
      if (!currentEditingTodoId) return

      if (confirm('确定要删除这个待办事项吗？')) {
        deleteTodo(currentEditingTodoId)
        closeTodoEditModal()
      }
    }

    function editTodo(id) {
      openTodoEditModal(id)
    }

    // ========== 图片查看器 ==========

    function openImageViewer(imageSrc) {
      viewerImage.src = imageSrc
      imageViewerModal.classList.remove('hidden')
    }

    function closeImageViewer() {
      imageViewerModal.classList.add('hidden')
      viewerImage.src = ''
    }

    // 通用的防抖函数
    function debounce(func, wait) {
      let timeout
      return function executedFunction(...args) {
        const later = () => {
          clearTimeout(timeout)
          func(...args)
        }
        clearTimeout(timeout)
        timeout = setTimeout(later, wait)
      }
    }

    function debouncedSync() {
      if (syncTimeout) {
        clearTimeout(syncTimeout)
      }
      syncTimeout = setTimeout(() => {
        syncToCloud()
      }, 1000)
    }

    // ========== 渲染 ==========
    function renderTodos() {
      const visibleTodos = getVisibleTodos(selectedDate)

      if (visibleTodos.length === 0) {
        todoList.innerHTML = ''
        emptyState.classList.remove('hidden')
        statsText.textContent = `0/0 已完成`
        return
      }

      emptyState.classList.add('hidden')

      const sortedTodos = visibleTodos.sort((a, b) => {
        if (a.completed === b.completed) {
          return new Date(b.createdAt) - new Date(a.createdAt)
        }
        return a.completed ? 1 : -1
      })

      todoList.innerHTML = sortedTodos.map(todo => {
        const timeRange = formatTimeRange(todo.startTime, todo.endTime)
        const timeTag = timeRange
          ? `<div class="todo-time-tag ${todo.endTime ? '' : 'single-time'}"><span class="time-icon">◷</span>${timeRange}</div>`
          : ''

        // 生成图片缩略图
        let imagesHtml = ''
        if (todo.images && todo.images.length > 0) {
          const displayImages = todo.images.slice(0, 3)
          const hasMore = todo.images.length > 3
          imagesHtml = `
            <div class="todo-images">
              ${displayImages.map((img, idx) => `
                <div class="todo-thumbnail" onclick="event.stopPropagation(); openImageViewer('${img}')">
                  <img src="${img}" alt="图片${idx + 1}">
                </div>
              `).join('')}
              ${hasMore ? `<div class="todo-thumbnail more">+${todo.images.length - 3}</div>` : ''}
            </div>
          `
        }

        return `
        <div class="todo-item ${todo.completed ? 'completed' : ''}" data-id="${todo.id}">
          <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo(${todo.id})"></div>
          <div class="todo-content" onclick="editTodo(${todo.id})">
            <div class="todo-text">${escapeHtml(todo.text)}</div>
            ${timeTag}
            ${hasNote(todo) ? `<div class="todo-note">${escapeHtml(todo.note)}</div>` : ''}
            ${imagesHtml}
          </div>
          <div class="todo-actions">
            <button class="todo-action-btn edit" onclick="event.stopPropagation(); editTodo(${todo.id})" title="编辑">✎</button>
            <button class="todo-action-btn delete" onclick="event.stopPropagation(); deleteTodo(${todo.id})" title="删除">✕</button>
          </div>
        </div>
      `
      }).join('')

      const completed = visibleTodos.filter(t => t.completed).length
      statsText.textContent = `${completed}/${visibleTodos.length} 已完成`
    }

    function renderCalendar() {
      const year = currentDate.getFullYear()
      const month = currentDate.getMonth()

      currentMonth.textContent = `${year}年${month + 1}月`
      calendarGrid.innerHTML = ''

      const weekdays = ['日', '一', '二', '三', '四', '五', '六']
      weekdays.forEach(day => {
        const header = document.createElement('div')
        header.className = 'weekday-header'
        header.textContent = day
        calendarGrid.appendChild(header)
      })

      const firstDay = new Date(year, month, 1)
      const lastDay = new Date(year, month + 1, 0)
      const startWeekday = firstDay.getDay()

      const prevMonthLastDay = new Date(year, month, 0).getDate()
      for (let i = startWeekday - 1; i >= 0; i--) {
        const dayEl = document.createElement('div')
        dayEl.className = 'calendar-day other-month'
        dayEl.textContent = prevMonthLastDay - i
        calendarGrid.appendChild(dayEl)
      }

      for (let day = 1; day <= lastDay.getDate(); day++) {
        const dateStr = formatDate(new Date(year, month, day))
        const dayEl = document.createElement('div')
        dayEl.className = 'calendar-day'
        dayEl.textContent = day

        if (isToday(dateStr)) {
          dayEl.classList.add('today')
        }

        if (dateStr === selectedDate) {
          dayEl.classList.add('selected')
        }

        if (getVisibleTodos(dateStr).length > 0) {
          dayEl.classList.add('has-todo')
        }

        if (dateHasNote(dateStr)) {
          dayEl.classList.add('has-note')
          dayEl.title = '有备注'
        }

        dayEl.addEventListener('click', () => {
          selectDate(dateStr)
          renderCalendar()
        })

        calendarGrid.appendChild(dayEl)
      }

      const remainingDays = 42 - (startWeekday + lastDay.getDate())
      for (let day = 1; day <= remainingDays; day++) {
        const dayEl = document.createElement('div')
        dayEl.className = 'calendar-day other-month'
        dayEl.textContent = day
        calendarGrid.appendChild(dayEl)
      }
    }

    function selectDate(dateStr) {
      selectedDate = dateStr
      dateTitle.textContent = formatDisplayDate(dateStr)
      weekdayLabel.textContent = getWeekday(dateStr)
      renderTodos()
      renderWeekView()
    }

    function renderWeekView() {
      // 获取选中日期所在周的日期范围（周一开始）
      const selected = new Date(selectedDate)
      const currentDay = selected.getDay() // 0是周日
      const diff = selected.getDate() - currentDay + (currentDay === 0 ? -6 : 1)
      const monday = new Date(selected)
      monday.setDate(diff)

      const weekDays = []
      for (let i = 0; i < 7; i++) {
        const day = new Date(monday)
        day.setDate(monday.getDate() + i)
        weekDays.push(day)
      }

      const weekdays = ['一', '二', '三', '四', '五', '六', '日']

      weekView.innerHTML = weekDays.map((date, index) => {
        const dateStr = formatDate(date)
        const dayNum = date.getDate()
        const isToday = formatDate(new Date()) === dateStr
        const isSelected = selectedDate === dateStr
        const visibleTodos = getVisibleTodos(dateStr)
        const noteIcon = visibleTodos.some(hasNote) ? '<span class="week-day-note-icon" title="有备注">✎</span>' : ''

        let todoHTML = ''
        if (visibleTodos.length === 0) {
          todoHTML = '<div class="week-day-empty">无待办</div>'
        } else {
          const displayTodos = visibleTodos.slice(0, 3)
          todoHTML = displayTodos.map(t => {
            const timeStr = t.startTime ? formatTimeDisplay(t.startTime) : ''
            const timeLabel = timeStr ? `<span class="week-time-label">${timeStr}</span>` : ''
            return `
            <div class="week-todo-item ${t.completed ? 'completed' : ''}">${timeLabel}${escapeHtml(t.text)}</div>
          `
          }).join('')
          if (visibleTodos.length > 3) {
            todoHTML += `<div class="week-todo-more">+${visibleTodos.length - 3} 更多</div>`
          }
        }

        return `
          <div class="week-day ${isSelected ? 'selected' : ''} ${isToday ? 'today' : ''}" onclick="selectDate('${dateStr}')">
            <div class="week-day-header">
              <span class="week-day-name">周${weekdays[index]}</span>
              <span class="week-day-date">${dayNum}</span>
              ${noteIcon}
            </div>
            <div class="week-day-todos">
              ${todoHTML}
            </div>
          </div>
        `
      }).join('')
    }

    // ========== 初始化 ==========
    function init() {
      loadAccountData()

      if (syncPassword) {
        hideLoginModal()
        logoutBtn.style.display = 'block'
        updateCurrentAccountDisplay()
        updateSyncStatus(true)
        syncToCloud()
      } else {
        showLoginModal()
      }

      selectDate(formatDate(new Date()))
      renderCalendar()
      bindEvents()

      setInterval(() => {
        if (syncPassword && Object.keys(todos).length > 0) {
          syncToCloud()
        }
      }, 30000)
    }

    function bindEvents() {
      addBtn.addEventListener('click', addTodo)
      todoInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo()
      })

      // 智能输入事件
      smartAddBtn.addEventListener('click', handleSmartInput)
      smartInput.addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.metaKey) {
          // Cmd/Ctrl + Enter 触发识别
          handleSmartInput()
        }
      })

      prevMonth.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1)
        renderCalendar()
      })

      nextMonth.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1)
        renderCalendar()
      })

      goToday.addEventListener('click', () => {
        currentDate = new Date()
        selectDate(formatDate(new Date()))
        renderCalendar()
      })

      syncBtn.addEventListener('click', syncToCloud)
      loginBtn.addEventListener('click', handleLogin)
      syncPasswordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin()
      })
      logoutBtn.addEventListener('click', showLoginModal)
      closeLoginModal.addEventListener('click', hideLoginModal)
      localModeBtn.addEventListener('click', switchToLocalMode)

      // 搜索事件
      searchInput.addEventListener('input', debounce((e) => {
        performSearch(e.target.value.trim())
      }, 300))

      searchInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
          performSearch(searchInput.value.trim())
        }
      })

      // ESC 关闭搜索面板
      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && !searchPanel.classList.contains('hidden')) {
          searchPanel.classList.add('hidden')
          searchInput.value = ''
          searchResults.innerHTML = ''
        }
      })

      // 图片上传事件
      imageInput.addEventListener('change', handleImageUpload)

      // 简洁模式图片上传事件
      simpleImageInput.addEventListener('change', handleSimpleImageUpload)

      // 粘贴事件监听
      todoInput.addEventListener('paste', handleSimplePaste)
      todoNoteInput.addEventListener('paste', handleSimplePaste)
      simpleImagePreview.addEventListener('paste', handleSimplePaste)
    }

    // 启动
    init()
  </script>
</body>
</html>
