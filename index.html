<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>日程 · 每日计划</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      /* 日式禅意配色 */
      --bg-primary: #F7F5F0;
      --bg-secondary: #EDE9E3;
      --bg-paper: #FFFCF8;
      --ink-primary: #2C2C2C;
      --ink-secondary: #6B6B6B;
      --ink-muted: #9B9B9B;
      --accent-vermilion: #C84B31;
      --accent-bamboo: #4A7C6F;
      --accent-washi: rgba(255, 255, 255, 0.7);
      --shadow-soft: 0 4px 20px rgba(44, 44, 44, 0.06);
      --shadow-elevated: 0 8px 40px rgba(44, 44, 44, 0.12);
      --radius: 2px;
      --radius-lg: 8px;

      /* 字体 */
      --font-serif: 'Noto Serif SC', 'Songti SC', serif;
      --font-sans: 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg-primary);
      color: var(--ink-primary);
      min-height: 100vh;
      overflow-x: hidden;
      line-height: 1.6;
    }

    /* 纸张纹理背景 */
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        repeating-linear-gradient(
          0deg,
          transparent,
          transparent 2px,
          rgba(0,0,0,0.015) 2px,
          rgba(0,0,0,0.015) 4px
        ),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      opacity: 0.4;
      pointer-events: none;
      z-index: -1;
    }

    /* 登录模态框 */
    .login-modal {
      position: fixed;
      inset: 0;
      background: rgba(247, 245, 240, 0.95);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1000;
      backdrop-filter: blur(20px);
      transition: opacity 0.4s ease, visibility 0.4s ease;
    }

    .login-modal.hidden {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    .login-container {
      width: 90%;
      max-width: 420px;
      position: relative;
    }

    .login-card {
      background: var(--bg-paper);
      border: 1px solid rgba(44, 44, 44, 0.08);
      border-radius: var(--radius-lg);
      padding: 48px 40px;
      box-shadow: var(--shadow-elevated);
      position: relative;
      overflow: hidden;
    }

    .login-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--accent-vermilion), var(--accent-bamboo));
    }

    .login-header {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-title {
      font-family: var(--font-serif);
      font-size: 32px;
      font-weight: 600;
      color: var(--ink-primary);
      margin-bottom: 8px;
      letter-spacing: 0.1em;
    }

    .login-subtitle {
      font-size: 14px;
      color: var(--ink-muted);
      font-weight: 300;
    }

    /* 账号列表 */
    .account-section {
      margin-bottom: 28px;
    }

    .account-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: var(--ink-muted);
      margin-bottom: 12px;
      font-weight: 500;
    }

    .account-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 160px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .account-list::-webkit-scrollbar {
      width: 4px;
    }

    .account-list::-webkit-scrollbar-thumb {
      background: var(--bg-secondary);
      border-radius: 2px;
    }

    .account-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-primary);
      border: 1px solid transparent;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.25s ease;
    }

    .account-item:hover {
      background: var(--bg-paper);
      border-color: rgba(200, 75, 49, 0.3);
      transform: translateX(4px);
    }

    .account-item.active {
      background: rgba(200, 75, 49, 0.08);
      border-color: var(--accent-vermilion);
    }

    .account-name {
      font-family: var(--font-sans);
      font-size: 14px;
      color: var(--ink-primary);
      font-weight: 400;
    }

    .account-item.active .account-name {
      color: var(--accent-vermilion);
      font-weight: 500;
    }

    .account-delete {
      width: 24px;
      height: 24px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      transition: all 0.2s ease;
    }

    .account-item:hover .account-delete {
      opacity: 1;
    }

    .account-delete:hover {
      background: rgba(200, 75, 49, 0.1);
      color: var(--accent-vermilion);
    }

    /* 分割线 */
    .divider {
      display: flex;
      align-items: center;
      margin: 24px 0;
      color: var(--ink-muted);
      font-size: 11px;
      letter-spacing: 0.1em;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--bg-secondary), transparent);
    }

    .divider::before {
      margin-right: 12px;
    }

    .divider::after {
      margin-left: 12px;
    }

    /* 输入框 */
    .input-group {
      position: relative;
      margin-bottom: 20px;
    }

    .input-field {
      width: 100%;
      padding: 16px 0 12px;
      font-size: 15px;
      border: none;
      border-bottom: 1px solid var(--bg-secondary);
      background: transparent;
      color: var(--ink-primary);
      outline: none;
      transition: border-color 0.3s ease;
      font-family: var(--font-sans);
    }

    .input-field:focus {
      border-bottom-color: var(--accent-vermilion);
    }

    .input-field::placeholder {
      color: var(--ink-muted);
      font-weight: 300;
    }

    .input-label {
      position: absolute;
      left: 0;
      top: 16px;
      font-size: 15px;
      color: var(--ink-muted);
      pointer-events: none;
      transition: all 0.2s ease;
    }

    .input-field:focus + .input-label,
    .input-field:not(:placeholder-shown) + .input-label {
      top: -4px;
      font-size: 11px;
      color: var(--accent-vermilion);
    }

    /* 按钮 */
    .btn {
      width: 100%;
      padding: 16px 24px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: var(--radius);
      cursor: pointer;
      transition: all 0.3s ease;
      font-family: var(--font-sans);
      letter-spacing: 0.05em;
    }

    .btn-primary {
      background: var(--ink-primary);
      color: var(--bg-paper);
      box-shadow: var(--shadow-soft);
    }

    .btn-primary:hover {
      background: var(--accent-vermilion);
      transform: translateY(-1px);
      box-shadow: var(--shadow-elevated);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    /* 关闭按钮 */
    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      width: 36px;
      height: 36px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      transition: all 0.2s ease;
    }

    .modal-close:hover {
      background: var(--bg-secondary);
      color: var(--ink-primary);
    }

    /* 主应用容器 */
    .app-container {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
      max-width: 1400px;
      margin: 0 auto;
    }

    /* 侧边栏 */
    .sidebar {
      background: var(--bg-paper);
      border-right: 1px solid rgba(44, 44, 44, 0.06);
      padding: 32px 24px;
      display: flex;
      flex-direction: column;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }

    .brand {
      margin-bottom: 32px;
    }

    .brand-title {
      font-family: var(--font-serif);
      font-size: 24px;
      font-weight: 600;
      color: var(--ink-primary);
      letter-spacing: 0.15em;
      margin-bottom: 4px;
    }

    .brand-subtitle {
      font-size: 12px;
      color: var(--ink-muted);
      font-weight: 300;
      letter-spacing: 0.1em;
    }

    /* 日历 */
    .calendar-section {
      flex: 1;
    }

    .calendar-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .calendar-month {
      font-family: var(--font-serif);
      font-size: 18px;
      font-weight: 600;
      color: var(--ink-primary);
      letter-spacing: 0.05em;
    }

    .calendar-nav {
      display: flex;
      gap: 8px;
    }

    .nav-btn {
      width: 32px;
      height: 32px;
      border: 1px solid var(--bg-secondary);
      background: transparent;
      color: var(--ink-secondary);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      transition: all 0.2s ease;
    }

    .nav-btn:hover {
      background: var(--bg-primary);
      border-color: var(--accent-vermilion);
      color: var(--accent-vermilion);
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 4px;
    }

    .weekday-header {
      text-align: center;
      font-size: 11px;
      color: var(--ink-muted);
      padding: 8px 0;
      font-weight: 400;
      letter-spacing: 0.1em;
    }

    .calendar-day {
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      color: var(--ink-secondary);
      cursor: pointer;
      border-radius: 50%;
      transition: all 0.2s ease;
      position: relative;
    }

    .calendar-day:hover {
      background: var(--bg-primary);
      color: var(--ink-primary);
    }

    .calendar-day.other-month {
      color: var(--ink-muted);
      opacity: 0.5;
    }

    .calendar-day.today {
      color: var(--accent-vermilion);
      font-weight: 600;
    }

    .calendar-day.selected {
      background: var(--ink-primary);
      color: var(--bg-paper);
      font-weight: 500;
    }

    .calendar-day.has-todo::after {
      content: '';
      position: absolute;
      bottom: 4px;
      width: 4px;
      height: 4px;
      background: var(--accent-bamboo);
      border-radius: 50%;
    }

    /* 侧边栏操作区 */
    .sidebar-actions {
      margin-top: auto;
      padding-top: 24px;
      border-top: 1px solid var(--bg-secondary);
    }

    .action-btn {
      width: 100%;
      padding: 12px 16px;
      margin-bottom: 8px;
      font-size: 13px;
      border: 1px solid var(--bg-secondary);
      background: transparent;
      color: var(--ink-secondary);
      cursor: pointer;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
    }

    .action-btn:hover {
      background: var(--bg-primary);
      border-color: var(--ink-secondary);
      color: var(--ink-primary);
    }

    .action-btn.primary {
      background: var(--ink-primary);
      border-color: var(--ink-primary);
      color: var(--bg-paper);
    }

    .action-btn.primary:hover {
      background: var(--accent-vermilion);
      border-color: var(--accent-vermilion);
    }

    .action-btn.syncing {
      background: rgba(74, 124, 111, 0.1);
      border-color: var(--accent-bamboo);
      color: var(--accent-bamboo);
    }

    .action-btn.success {
      background: rgba(74, 124, 111, 0.15);
      border-color: var(--accent-bamboo);
      color: var(--accent-bamboo);
    }

    .action-btn.error {
      background: rgba(200, 75, 49, 0.1);
      border-color: var(--accent-vermilion);
      color: var(--accent-vermilion);
    }

    .sync-status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      margin-top: 8px;
      font-size: 12px;
      color: var(--ink-muted);
    }

    .current-account {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 12px;
      padding: 8px 12px;
      background: var(--bg-primary);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--ink-secondary);
    }

    .current-account.hidden {
      display: none;
    }

    .account-label {
      color: var(--ink-muted);
    }

    .account-value {
      font-family: var(--font-sans);
      font-weight: 500;
      color: var(--ink-primary);
      letter-spacing: 0.05em;
    }

    .sync-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--ink-muted);
    }

    .sync-status.online .sync-dot {
      background: var(--accent-bamboo);
    }

    /* 主内容区 */
    .main-content {
      padding: 48px 56px;
      display: flex;
      flex-direction: column;
    }

    .content-header {
      margin-bottom: 40px;
    }

    .date-display {
      margin-bottom: 8px;
    }

    .date-title {
      font-family: var(--font-serif);
      font-size: 42px;
      font-weight: 600;
      color: var(--ink-primary);
      letter-spacing: 0.02em;
      line-height: 1.2;
    }

    .date-meta {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 8px;
    }

    .weekday-label {
      font-size: 14px;
      color: var(--ink-secondary);
      font-weight: 400;
    }

    .stats {
      font-size: 13px;
      color: var(--ink-muted);
      padding: 4px 12px;
      background: var(--bg-secondary);
      border-radius: 20px;
    }

    /* 输入区 */
    .input-section {
      margin-bottom: 32px;
    }

    .todo-input-wrapper {
      position: relative;
      display: flex;
      align-items: center;
      border-bottom: 2px solid var(--bg-secondary);
      transition: border-color 0.3s ease;
    }

    .todo-input-wrapper:focus-within {
      border-bottom-color: var(--accent-vermilion);
    }

    .todo-input {
      flex: 1;
      padding: 16px 0;
      font-size: 16px;
      border: none;
      background: transparent;
      color: var(--ink-primary);
      outline: none;
      font-family: var(--font-sans);
    }

    .todo-input::placeholder {
      color: var(--ink-muted);
      font-weight: 300;
    }

    .add-btn {
      padding: 10px 20px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      background: transparent;
      color: var(--accent-vermilion);
      cursor: pointer;
      transition: all 0.2s ease;
      font-family: var(--font-sans);
      letter-spacing: 0.05em;
    }

    .add-btn:hover {
      background: rgba(200, 75, 49, 0.08);
      border-radius: var(--radius);
    }

    /* 待办列表 */
    .todo-list-container {
      flex: 1;
      overflow-y: auto;
    }

    .todo-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      padding: 16px 20px;
      background: var(--bg-paper);
      border: 1px solid rgba(44, 44, 44, 0.06);
      border-radius: var(--radius-lg);
      transition: all 0.25s ease;
      cursor: pointer;
      box-shadow: var(--shadow-soft);
    }

    .todo-item:hover {
      box-shadow: var(--shadow-elevated);
      transform: translateY(-1px);
    }

    .todo-item.completed {
      opacity: 0.6;
    }

    .todo-item.completed .todo-text {
      text-decoration: line-through;
      color: var(--ink-muted);
    }

    .todo-checkbox {
      width: 20px;
      height: 20px;
      border: 2px solid var(--bg-secondary);
      border-radius: 50%;
      margin-right: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s ease;
      flex-shrink: 0;
    }

    .todo-checkbox:hover {
      border-color: var(--accent-bamboo);
    }

    .todo-checkbox.checked {
      background: var(--accent-bamboo);
      border-color: var(--accent-bamboo);
    }

    .todo-checkbox.checked::after {
      content: '✓';
      color: white;
      font-size: 12px;
    }

    .todo-text {
      flex: 1;
      font-size: 15px;
      color: var(--ink-primary);
      line-height: 1.5;
      word-break: break-word;
    }

    .todo-actions {
      display: flex;
      gap: 4px;
      opacity: 0;
      transition: opacity 0.2s ease;
    }

    .todo-item:hover .todo-actions {
      opacity: 1;
    }

    .todo-action-btn {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--ink-muted);
      cursor: pointer;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      transition: all 0.2s ease;
    }

    .todo-action-btn:hover {
      background: var(--bg-primary);
    }

    .todo-action-btn.edit:hover {
      color: var(--accent-bamboo);
    }

    .todo-action-btn.delete:hover {
      color: var(--accent-vermilion);
    }

    /* 空状态 */
    .empty-state {
      text-align: center;
      padding: 80px 20px;
      color: var(--ink-muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .empty-title {
      font-size: 16px;
      color: var(--ink-secondary);
      margin-bottom: 8px;
    }

    .empty-hint {
      font-size: 13px;
      font-weight: 300;
    }

    /* 提示信息 */
    .hint-text {
      font-size: 12px;
      color: var(--ink-muted);
      margin-top: 16px;
      text-align: center;
      font-weight: 300;
    }

    /* 响应式 */
    @media (max-width: 900px) {
      .app-container {
        grid-template-columns: 1fr;
      }

      .sidebar {
        height: auto;
        position: relative;
        border-right: none;
        border-bottom: 1px solid rgba(44, 44, 44, 0.06);
        padding: 20px;
      }

      .main-content {
        padding: 24px;
      }

      .date-title {
        font-size: 28px;
      }
    }

    /* 动画 */
    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .todo-item {
      animation: slideIn 0.3s ease;
    }
  </style>
</head>
<body>
  <!-- 登录模态框 -->
  <div id="loginModal" class="login-modal">
    <div class="login-container">
      <div class="login-card">
        <button id="closeLoginModal" class="modal-close" title="关闭">×</button>
        <div class="login-header">
          <h1 class="login-title">日程</h1>
          <p class="login-subtitle">每日计划 · 随心而行</p>
        </div>

        <div id="accountSection" class="account-section" style="display: none;">
          <div class="account-label">已保存的账号</div>
          <div id="accountsContainer" class="account-list"></div>
        </div>

        <div class="divider">新账号登录</div>

        <div class="input-group">
          <input type="password" id="syncPassword" class="input-field" placeholder="输入同步密码..." autocomplete="off">
        </div>

        <button id="loginBtn" class="btn btn-primary">开始同步</button>

        <p class="hint-text">密码即账号，在新设备输入相同密码即可同步数据</p>
      </div>
    </div>
  </div>

  <div class="app-container">
    <!-- 侧边栏 -->
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-title">日程</div>
        <div class="brand-subtitle">SCHEDULE · Daily Planner</div>
      </div>

      <div class="calendar-section">
        <div class="calendar-header">
          <span id="currentMonth" class="calendar-month"></span>
          <div class="calendar-nav">
            <button id="prevMonth" class="nav-btn" title="上个月">‹</button>
            <button id="nextMonth" class="nav-btn" title="下个月">›</button>
          </div>
        </div>
        <div id="calendarGrid" class="calendar-grid"></div>
      </div>

      <div class="sidebar-actions">
        <button id="goToday" class="action-btn">今日</button>
        <button id="syncBtn" class="action-btn primary">同步到云端</button>
        <div id="currentAccount" class="current-account hidden">
          <span class="account-label">当前账号</span>
          <span id="accountValue" class="account-value"></span>
        </div>
        <div id="syncStatus" class="sync-status">
          <span class="sync-dot"></span>
          <span>本地模式</span>
        </div>
        <button id="logoutBtn" class="action-btn" style="display: none;">切换账号</button>
      </div>
    </aside>

    <!-- 主内容区 -->
    <main class="main-content">
      <header class="content-header">
        <div class="date-display">
          <h1 id="dateTitle" class="date-title"></h1>
          <div class="date-meta">
            <span id="weekdayLabel" class="weekday-label"></span>
            <span id="statsText" class="stats">0/0 已完成</span>
          </div>
        </div>
      </header>

      <div class="input-section">
        <div class="todo-input-wrapper">
          <input type="text" id="todoInput" class="todo-input" placeholder="添加新的待办事项..." autocomplete="off">
          <button id="addBtn" class="add-btn">添加</button>
        </div>
      </div>

      <div class="todo-list-container">
        <div id="todoList" class="todo-list"></div>
        <div id="emptyState" class="empty-state">
          <div class="empty-icon">◯</div>
          <div class="empty-title">暂无待办</div>
          <div class="empty-hint">点击下方输入框添加事项</div>
        </div>
      </div>
    </main>
  </div>

  <script>
    // ========== 配置 ==========
    const API_BASE = window.location.hostname === 'localhost'
      ? 'http://localhost:3000/api'
      : `${window.location.origin}/api`

    // ========== 状态管理 ==========
    let currentDate = new Date()
    let selectedDate = formatDate(new Date())
    let todos = {}
    let syncPassword = localStorage.getItem('daily-planner-current-account') || ''
    let accounts = JSON.parse(localStorage.getItem('daily-planner-accounts') || '[]')
    let isOnline = false
    let syncTimeout = null

    // ========== DOM 元素 ==========
    const dateTitle = document.getElementById('dateTitle')
    const weekdayLabel = document.getElementById('weekdayLabel')
    const todoInput = document.getElementById('todoInput')
    const addBtn = document.getElementById('addBtn')
    const todoList = document.getElementById('todoList')
    const emptyState = document.getElementById('emptyState')
    const statsText = document.getElementById('statsText')
    const currentMonth = document.getElementById('currentMonth')
    const calendarGrid = document.getElementById('calendarGrid')
    const prevMonth = document.getElementById('prevMonth')
    const nextMonth = document.getElementById('nextMonth')
    const goToday = document.getElementById('goToday')
    const syncBtn = document.getElementById('syncBtn')
    const syncStatus = document.getElementById('syncStatus')
    const logoutBtn = document.getElementById('logoutBtn')
    const currentAccount = document.getElementById('currentAccount')
    const accountValue = document.getElementById('accountValue')
    const loginModal = document.getElementById('loginModal')
    const syncPasswordInput = document.getElementById('syncPassword')
    const loginBtn = document.getElementById('loginBtn')
    const closeLoginModal = document.getElementById('closeLoginModal')
    const accountSection = document.getElementById('accountSection')
    const accountsContainer = document.getElementById('accountsContainer')

    // ========== 工具函数 ==========
    function formatDate(date) {
      const year = date.getFullYear()
      const month = String(date.getMonth() + 1).padStart(2, '0')
      const day = String(date.getDate()).padStart(2, '0')
      return `${year}-${month}-${day}`
    }

    function formatDisplayDate(dateStr) {
      const [year, month, day] = dateStr.split('-')
      return `${year}年${parseInt(month)}月${parseInt(day)}日`
    }

    function getWeekday(dateStr) {
      const date = new Date(dateStr)
      const weekdays = ['周日', '周一', '周二', '周三', '周四', '周五', '周六']
      return weekdays[date.getDay()]
    }

    function isToday(dateStr) {
      return dateStr === formatDate(new Date())
    }

    function escapeHtml(text) {
      const div = document.createElement('div')
      div.textContent = text
      return div.innerHTML
    }

    // ========== API 调用 ==========
    async function apiCall(endpoint, method = 'GET', body = null) {
      if (!syncPassword) return null

      const options = {
        method,
        headers: {
          'Authorization': `Bearer ${syncPassword}`,
          'Content-Type': 'application/json'
        }
      }

      if (body) {
        options.body = JSON.stringify(body)
      }

      try {
        const response = await fetch(`${API_BASE}${endpoint}`, options)
        if (!response.ok) throw new Error(`HTTP ${response.status}`)
        return await response.json()
      } catch (error) {
        console.error('API Error:', error)
        throw error
      }
    }

    // ========== 同步功能 ==========
    async function syncToCloud() {
      if (!syncPassword) {
        showLoginModal()
        return
      }

      setSyncButtonState('syncing')

      try {
        const cloudData = await apiCall('/todos/sync', 'PUT', {
          localTodos: todos,
          lastSync: Date.now()
        })

        if (cloudData.success) {
          todos = cloudData.data
          saveLocalTodos()
          renderTodos()
          renderCalendar()
          setSyncButtonState('success')
          updateSyncStatus(true)
        }
      } catch (error) {
        console.error('Sync failed:', error)
        setSyncButtonState('error')
        updateSyncStatus(false)
      }

      setTimeout(() => {
        setSyncButtonState('idle')
      }, 2000)
    }

    function setSyncButtonState(state) {
      syncBtn.classList.remove('syncing', 'success', 'error')

      switch (state) {
        case 'syncing':
          syncBtn.classList.add('syncing')
          syncBtn.textContent = '同步中...'
          break
        case 'success':
          syncBtn.classList.add('success')
          syncBtn.textContent = '同步成功'
          break
        case 'error':
          syncBtn.classList.add('error')
          syncBtn.textContent = '同步失败'
          break
        default:
          syncBtn.textContent = '同步到云端'
      }
    }

    function updateSyncStatus(online) {
      isOnline = online
      const dot = syncStatus.querySelector('.sync-dot')
      const text = syncStatus.querySelector('span:last-child')

      if (online) {
        syncStatus.classList.add('online')
        text.textContent = '已同步'
      } else {
        syncStatus.classList.remove('online')
        text.textContent = '本地模式'
      }
    }

    function updateCurrentAccountDisplay() {
      if (syncPassword) {
        const masked = syncPassword.slice(0, 2) + '***' + syncPassword.slice(-2)
        accountValue.textContent = masked
        currentAccount.classList.remove('hidden')
      } else {
        currentAccount.classList.add('hidden')
        accountValue.textContent = ''
      }
    }

    // ========== 账号管理 ==========
    function loadAccountData() {
      if (syncPassword) {
        const savedTodos = localStorage.getItem(`daily-planner-todos-${syncPassword}`)
        todos = savedTodos ? JSON.parse(savedTodos) : {}
      } else {
        todos = {}
      }
    }

    function saveLocalTodos() {
      if (syncPassword) {
        localStorage.setItem(`daily-planner-todos-${syncPassword}`, JSON.stringify(todos))
      }
    }

    function saveAccounts() {
      localStorage.setItem('daily-planner-accounts', JSON.stringify(accounts))
    }

    function addAccount(password) {
      if (!accounts.includes(password)) {
        accounts.push(password)
        saveAccounts()
      }
      localStorage.setItem('daily-planner-current-account', password)
    }

    function removeAccount(password) {
      accounts = accounts.filter(p => p !== password)
      saveAccounts()
      localStorage.removeItem(`daily-planner-todos-${password}`)
    }

    function switchAccount(password) {
      saveLocalTodos()
      syncPassword = password
      addAccount(password)
      loadAccountData()
      hideLoginModal()
      logoutBtn.style.display = 'block'
      updateCurrentAccountDisplay()
      updateSyncStatus(true)
      selectDate(formatDate(new Date()))
      renderTodos()
      renderCalendar()
      syncToCloud()
    }

    function renderAccountList() {
      if (accounts.length === 0) {
        accountSection.style.display = 'none'
        return
      }

      accountSection.style.display = 'block'
      accountsContainer.innerHTML = accounts.map(password => {
        const masked = password.slice(0, 2) + '***' + password.slice(-2)
        const isActive = password === syncPassword
        return `
          <div class="account-item ${isActive ? 'active' : ''}" onclick="switchAccount('${password}')">
            <span class="account-name">${masked}</span>
            <button class="account-delete" onclick="event.stopPropagation(); removeAccountAndRefresh('${password}')" title="删除">×</button>
          </div>
        `
      }).join('')
    }

    function removeAccountAndRefresh(password) {
      if (confirm('确定要删除这个账号吗？本地数据将被清除，但云端数据不受影响。')) {
        removeAccount(password)
        if (syncPassword === password) {
          syncPassword = ''
          localStorage.removeItem('daily-planner-current-account')
          todos = {}
          logoutBtn.style.display = 'none'
          updateSyncStatus(false)
        }
        renderAccountList()
        renderTodos()
        renderCalendar()
      }
    }

    // ========== 登录相关 ==========
    function showLoginModal() {
      loginModal.classList.remove('hidden')
      renderAccountList()
      syncPasswordInput.focus()
    }

    function hideLoginModal() {
      loginModal.classList.add('hidden')
    }

    async function handleLogin() {
      const password = syncPasswordInput.value.trim()
      if (!password) {
        alert('请输入同步密码')
        return
      }

      if (syncPassword) {
        saveLocalTodos()
      }

      syncPassword = password
      addAccount(password)
      loadAccountData()

      hideLoginModal()
      logoutBtn.style.display = 'block'
      updateCurrentAccountDisplay()

      try {
        const response = await apiCall('/todos')
        if (response.success && response.data && Object.keys(response.data).length > 0) {
          todos = response.data
          saveLocalTodos()
        }
        updateSyncStatus(true)
      } catch (error) {
        updateSyncStatus(false)
      }

      renderTodos()
      renderCalendar()
    }

    function handleLogout() {
      saveLocalTodos()
      syncPassword = ''
      localStorage.removeItem('daily-planner-current-account')
      logoutBtn.style.display = 'none'
      updateCurrentAccountDisplay()
      updateSyncStatus(false)
      todos = {}
      syncPasswordInput.value = ''
      renderAccountList()
      showLoginModal()
      renderTodos()
      renderCalendar()
    }

    // ========== 待办功能 ==========
    function addTodo() {
      const text = todoInput.value.trim()
      if (!text) return

      if (!todos[selectedDate]) {
        todos[selectedDate] = []
      }

      const newTodo = {
        id: Date.now(),
        text: text,
        completed: false,
        createdAt: new Date().toISOString(),
        updatedAt: new Date().toISOString()
      }

      todos[selectedDate].push(newTodo)
      saveLocalTodos()

      if (syncPassword) {
        debouncedSync()
      }

      todoInput.value = ''
      renderTodos()
      renderCalendar()
    }

    function toggleTodo(id) {
      const dateTodos = todos[selectedDate]
      const todo = dateTodos.find(t => t.id === id)
      if (todo) {
        todo.completed = !todo.completed
        todo.updatedAt = new Date().toISOString()
        saveLocalTodos()

        if (syncPassword) {
          debouncedSync()
        }

        renderTodos()
      }
    }

    function deleteTodo(id) {
      const dateTodos = todos[selectedDate]
      const todo = dateTodos.find(t => t.id === id)
      if (todo) {
        todo.deleted = true
        todo.updatedAt = new Date().toISOString()
        saveLocalTodos()

        if (syncPassword) {
          debouncedSync()
        }

        renderTodos()
        renderCalendar()
      }
    }

    let editingTodoId = null

    function editTodo(id) {
      const dateTodos = todos[selectedDate]
      const todo = dateTodos.find(t => t.id === id)
      if (todo) {
        editingTodoId = id
        const newText = prompt('编辑待办事项:', todo.text)
        if (newText && newText.trim() !== '') {
          todo.text = newText.trim()
          todo.updatedAt = new Date().toISOString()
          saveLocalTodos()

          if (syncPassword) {
            debouncedSync()
          }

          renderTodos()
        }
        editingTodoId = null
      }
    }

    function debouncedSync() {
      if (syncTimeout) {
        clearTimeout(syncTimeout)
      }
      syncTimeout = setTimeout(() => {
        syncToCloud()
      }, 1000)
    }

    // ========== 渲染 ==========
    function renderTodos() {
      const dateTodos = todos[selectedDate] || []
      const visibleTodos = dateTodos.filter(t => !t.deleted)

      if (visibleTodos.length === 0) {
        todoList.innerHTML = ''
        emptyState.classList.remove('hidden')
        statsText.textContent = `0/0 已完成`
        return
      }

      emptyState.classList.add('hidden')

      const sortedTodos = visibleTodos.sort((a, b) => {
        if (a.completed === b.completed) {
          return new Date(b.createdAt) - new Date(a.createdAt)
        }
        return a.completed ? 1 : -1
      })

      todoList.innerHTML = sortedTodos.map(todo => `
        <div class="todo-item ${todo.completed ? 'completed' : ''}">
          <div class="todo-checkbox ${todo.completed ? 'checked' : ''}" onclick="toggleTodo(${todo.id})"></div>
          <span class="todo-text" onclick="editTodo(${todo.id})">${escapeHtml(todo.text)}</span>
          <div class="todo-actions">
            <button class="todo-action-btn edit" onclick="event.stopPropagation(); editTodo(${todo.id})" title="编辑">✎</button>
            <button class="todo-action-btn delete" onclick="event.stopPropagation(); deleteTodo(${todo.id})" title="删除">✕</button>
          </div>
        </div>
      `).join('')

      const completed = visibleTodos.filter(t => t.completed).length
      statsText.textContent = `${completed}/${visibleTodos.length} 已完成`
    }

    function renderCalendar() {
      const year = currentDate.getFullYear()
      const month = currentDate.getMonth()

      currentMonth.textContent = `${year}年${month + 1}月`
      calendarGrid.innerHTML = ''

      const weekdays = ['日', '一', '二', '三', '四', '五', '六']
      weekdays.forEach(day => {
        const header = document.createElement('div')
        header.className = 'weekday-header'
        header.textContent = day
        calendarGrid.appendChild(header)
      })

      const firstDay = new Date(year, month, 1)
      const lastDay = new Date(year, month + 1, 0)
      const startWeekday = firstDay.getDay()

      const prevMonthLastDay = new Date(year, month, 0).getDate()
      for (let i = startWeekday - 1; i >= 0; i--) {
        const dayEl = document.createElement('div')
        dayEl.className = 'calendar-day other-month'
        dayEl.textContent = prevMonthLastDay - i
        calendarGrid.appendChild(dayEl)
      }

      for (let day = 1; day <= lastDay.getDate(); day++) {
        const dateStr = formatDate(new Date(year, month, day))
        const dayEl = document.createElement('div')
        dayEl.className = 'calendar-day'
        dayEl.textContent = day

        if (isToday(dateStr)) {
          dayEl.classList.add('today')
        }

        if (dateStr === selectedDate) {
          dayEl.classList.add('selected')
        }

        if (todos[dateStr] && todos[dateStr].some(t => !t.deleted)) {
          dayEl.classList.add('has-todo')
        }

        dayEl.addEventListener('click', () => {
          selectDate(dateStr)
          renderCalendar()
        })

        calendarGrid.appendChild(dayEl)
      }

      const remainingDays = 42 - (startWeekday + lastDay.getDate())
      for (let day = 1; day <= remainingDays; day++) {
        const dayEl = document.createElement('div')
        dayEl.className = 'calendar-day other-month'
        dayEl.textContent = day
        calendarGrid.appendChild(dayEl)
      }
    }

    function selectDate(dateStr) {
      selectedDate = dateStr
      dateTitle.textContent = formatDisplayDate(dateStr)
      weekdayLabel.textContent = getWeekday(dateStr)
      renderTodos()
    }

    // ========== 初始化 ==========
    function init() {
      loadAccountData()

      if (syncPassword) {
        hideLoginModal()
        logoutBtn.style.display = 'block'
        updateCurrentAccountDisplay()
        updateSyncStatus(true)
        syncToCloud()
      } else {
        showLoginModal()
      }

      selectDate(formatDate(new Date()))
      renderCalendar()
      bindEvents()

      setInterval(() => {
        if (syncPassword && Object.keys(todos).length > 0) {
          syncToCloud()
        }
      }, 30000)
    }

    function bindEvents() {
      addBtn.addEventListener('click', addTodo)
      todoInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo()
      })

      prevMonth.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() - 1)
        renderCalendar()
      })

      nextMonth.addEventListener('click', () => {
        currentDate.setMonth(currentDate.getMonth() + 1)
        renderCalendar()
      })

      goToday.addEventListener('click', () => {
        currentDate = new Date()
        selectDate(formatDate(new Date()))
        renderCalendar()
      })

      syncBtn.addEventListener('click', syncToCloud)
      loginBtn.addEventListener('click', handleLogin)
      syncPasswordInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin()
      })
      logoutBtn.addEventListener('click', handleLogout)
      closeLoginModal.addEventListener('click', hideLoginModal)
    }

    // 启动
    init()
  </script>
</body>
</html>
